<br /><br />
<a href="#" onclick="startCall(); return false;">startCall()</a>
<br /><br />
<a href="#" onclick="dispatchCommand(); return false;">dispatchCommand()</a>
<br /><br />

<div id="logs" />
<div id="container" />
<div id="error" />

<script>

	function startCall(){
		bridge.send(JSON.stringify({
			service: 'startCallHandler',
			method: 'startCall',
			args: [],
			correlationId: '81a94e75-6e62-4751-8311-b5f8600d7132'
		}));	

		document.getElementById('logs').innerHTML = "done start";	
	}

	function dispatchCommand(){
		bridge.send(JSON.stringify({
			service: 'contentCommandHandler',
			method: 'contentCommand',
			args: [{
				name: 'navigate',
				scene: 'deviceGroup'
			}],
			correlationId: '81a94e75-6e62-4751-8311-b5f8600d7131'
		}));	

		document.getElementById('logs').innerHTML = "done dispatch";	
	}

	document.getElementById('container').innerHTML = Object.keys(window).sort().join(', ')

	try {
		document.getElementById('error').innerHTML = 'done'
	} catch (error){
		document.getElementById('error').innerHTML = error
	}	

</script>
